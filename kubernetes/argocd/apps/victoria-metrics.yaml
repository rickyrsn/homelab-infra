apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    chart: victoria-metrics-k8s-stack
    targetRevision: 0.72.6
    helm:
      releaseName: victoria-metrics
      values: |
        defaultDashboards:
          enabled: true
        defaultRules:
          create: true
        grafana:
          enabled: true
          persistence:
            enabled: true
            storageClassName: local-path
            size: 5Gi
          ingress:
            enabled: false
        alertmanager:
          enabled: false
        vmsingle:
          enabled: true
          spec:
            retentionPeriod: "14d"
            storage:
              accessModes:
                - ReadWriteOnce
              storageClassName: local-path
              resources:
                requests:
                  storage: 20Gi
        vmagent:
          spec:
            externalLabels:
              cluster: homelab
        victoria-metrics-operator:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
